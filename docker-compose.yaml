name: ${COMPOSE_PROJECT_NAME:-douyin-dev}

services:
  mysql:
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 20
    image: mysql:${MYSQL_IMAGE_TAG:-8.0}
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - douyin_net

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ]; then
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else
        redis-server --appendonly yes;
      fi'
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - douyin_net

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command: server /data --console-address ":9001"
    expose:
      - "9002"
      - "9003"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio_data:/data
    networks:
      - douyin_net
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address ':9001' &
      sleep 3 &&
      mc alias set myminio http://127.0.0.1:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc policy set readonly myminio/covers &&
      wait
      "

  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-4.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - douyin_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: douyin-backend:dev
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis
      - kafka
      - minio
    networks:
      - douyin_net

  nginx:
    image: nginx:1.27
    container_name: ${COMPOSE_PROJECT_NAME:-douyin-dev}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - douyin_net

volumes:
  mysql_data:
  redis_data:
  minio_data:
  kafka_data:

networks:
  douyin_net:
    driver: bridge